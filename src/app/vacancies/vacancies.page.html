<h2>Vacancies</h2>

{{vacancies().length}} vacancies
<table>
    <thead>
        <tr>
            <th></th>
            <th>company</th>
            <th>Status</th>
            <th></th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for (vacancy of vacancies(); track vacancy) {
        <tr>
            <td>
                {{vacancy.title}}
            </td>

            <td>
                {{vacancy.company}}
            </td>
            <td>
                <span class="status-chip" [ngClass]="vacancy.status">
                    {{vacancy.status}}
                </span>
            </td>
            <td>
                <appli-vacancy-detail [vacancyId]="vacancy.id"></appli-vacancy-detail>
            </td>
            <td>
                <button (click)="deleteVacancy(vacancy.id)">Delete</button>
            </td>
        </tr>
        }
    </tbody>
</table>
