<button (click)="dialog.showModal()">track response</button>
<dialog #dialog>
    <button (click)="dialog.close()">close</button>
    <form #responseFormTemplate>
        <label for="platform">Original text</label>
        <input [formField]="responseForm.originalText" type="text" (change)="updateForm()">
        <br>
        <label for="type">Type</label>
        <select [formField]="responseForm.type">
            <option value="REJECTION">Rejection</option>
            <option value="INFORMATION_REQUEST">Information request</option>
            <option value="INTERVIEW_SCHEDULE">Interview schedule</option>
            <option value="JOB_PROPOSAL">Job proposal</option>
        </select>
        <br>

        <label>
            Vacancy
        </label>
        <select name="vacancy" [formControl]="vacancyFormControl">
            <option value=""></option>
            @for(vacancy of vacancies; track vacancy.id) {
            <option [value]="vacancy.id">{{vacancy.role}} at {{vacancy.company}} -- {{vacancy.id}}</option>

            }
        </select>
        <br>
        <label for="proposalAmount">
            Proposal amount
        </label>
        <input type="number" [formField]="responseForm.type">
        <br>

        <label for="interviewDate">Interview</label>
        <input [formControl]="interviewDateFormControl"
            [disabled]="responseForm().value().type != RESPONSE_TYPES.INTERVIEW_SCHEDULE" type="datetime-local" name=""
            id="">
        <br>

        <label for="responseForm.people">People</label>
        <input type="text" [formField]="responseForm.people">
        <!-- people -->
        <button (click)="$event.preventDefault(); submitForm()">Submit</button>

    </form>
</dialog>
