<button (click)="dialog.showModal()">track response</button>
<dialog #dialog>
    <button (click)="dialog.close()">close</button>
    <form>
        <label for="platform">Original text</label>
        <input [formField]="responseForm.originalText" type="text" (change)="updateForm()">
        <br>
        <label for="type">Type</label>
        <select [formField]="responseForm.type">
            <option value="REJECTION">Rejection</option>
            <option value="INFORMATION_REQUEST">Information request</option>
            <option value="INTERVIEW_SCHEDULE">Interview schedule</option>
            <option value="JOB_PROPOSAL">Job proposal</option>
        </select>
        <br>

        <label>
            offer
        </label>
        <select name="offer" id="">
            <option value=""></option>
            @for(offer of offers; track offer.id) {
            <option [value]="offer.id">{{offer.role}} at {{offer.company}}</option>

            }
        </select>
        <br>
        <label for="proposalAmount">
            Proposal amount
        </label>
        <input [disabled]="responseForm().value().type 
        != RESPONSE_TYPES.JOB_PROPOSAL" type="number" name="" id="">
        <br>

        <label for="interviewDate">Interview</label>
        <input [disabled]="responseForm().value().type != RESPONSE_TYPES.INTERVIEW_SCHEDULE" [formControl]="formDate"
            type="datetime-local" name="" id="">
        <br>

        <label for="people">People</label>
        <input type="text" name="people">
        <!-- people -->

    </form>
</dialog>
